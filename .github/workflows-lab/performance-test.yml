  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          MATRIX_SIZE=${{ github.event.inputs.matrix_size || '10' }}
          MATRIX_JSON=$(seq 1 $MATRIX_SIZE | jq -R -s -c 'split("\n")[:-1]')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  start-queue-test:
    needs: generate-matrix
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
        job_id: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Simple test job
        run: |
          echo "Hello from matrix job ${{ matrix.job_id }} on ${{ matrix.runner }}"

  finish-queue-test:
    runs-on: ubuntu-latest
    needs: [system_info, start-queue-test]
    outputs:
      min_queue_time: ${{ steps.analyze.outputs.min_queue_time }}
      max_queue_time: ${{ steps.analyze.outputs.max_queue_time }}
      avg_queue_time: ${{ steps.analyze.outputs.avg_queue_time }}
      total_jobs: ${{ steps.analyze.outputs.total_jobs }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Analyze queue times
        id: analyze
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Analyzing queue times for workflow run ${{ github.run_id }}..."

          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs > jobs_data.json

          jq -r '.jobs[] | select(.name | contains("start-queue-test")) | "\(.created_at),\(.started_at),\(.name)"' jobs_data.json > queue_times.csv

          echo "Job queue times:" > queue_analysis.txt

          QUEUE_TIMES=()
          TOTAL_JOBS=0

          while IFS=',' read -r created_at started_at job_name; do
            if [[ -n "$created_at" && -n "$started_at" && "$created_at" != "null" && "$started_at" != "null" ]]; then
              CREATED_EPOCH=$(date -d "$created_at" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$created_at" +%s 2>/dev/null)
              STARTED_EPOCH=$(date -d "$started_at" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$started_at" +%s 2>/dev/null)

              if [[ -n "$CREATED_EPOCH" && -n "$STARTED_EPOCH" ]]; then
                QUEUE_TIME=$((STARTED_EPOCH - CREATED_EPOCH))
                QUEUE_TIMES+=($QUEUE_TIME)
                echo "$job_name: ${QUEUE_TIME}s" >> queue_analysis.txt
                TOTAL_JOBS=$((TOTAL_JOBS + 1))
              fi
            fi
          done < queue_times.csv

          if [[ ${#QUEUE_TIMES[@]} -gt 0 ]]; then
            IFS=$'\n' sorted_times=($(sort -n <<< "${QUEUE_TIMES[*]}"))
            MIN_QUEUE_TIME=${sorted_times[0]}
            MAX_QUEUE_TIME=${sorted_times[-1]}

            SUM=0
            for time in "${QUEUE_TIMES[@]}"; do
              SUM=$((SUM + time))
            done
            AVG_QUEUE_TIME=$((SUM / ${#QUEUE_TIMES[@]}))
          else
            MIN_QUEUE_TIME=0
            MAX_QUEUE_TIME=0
            AVG_QUEUE_TIME=0
            TOTAL_JOBS=0
            echo "No valid queue time data found" >> queue_analysis.txt
          fi

          echo "min_queue_time=$MIN_QUEUE_TIME" >> $GITHUB_OUTPUT
          echo "max_queue_time=$MAX_QUEUE_TIME" >> $GITHUB_OUTPUT
          echo "avg_queue_time=$AVG_QUEUE_TIME" >> $GITHUB_OUTPUT
          echo "total_jobs=$TOTAL_JOBS" >> $GITHUB_OUTPUT

          echo "### Job Queue Time Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- **Jobs analyzed:** $TOTAL_JOBS" >> $GITHUB_STEP_SUMMARY
          echo "- **Min queue time:** ${MIN_QUEUE_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Max queue time:** ${MAX_QUEUE_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Average queue time:** ${AVG_QUEUE_TIME}s" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload queue analysis results
        uses: actions/upload-artifact@v4
        with:
          name: queue-analysis-results
          path: |
            queue_analysis.txt
            queue_times.csv
            jobs_data.json

  network_bandwidth_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      download_speed_mbps: ${{ steps.test.outputs.download_speed_mbps }}
      upload_speed_mbps: ${{ steps.test.outputs.upload_speed_mbps }}
      ping_ms: ${{ steps.test.outputs.ping_ms }}
      server_location: ${{ steps.test.outputs.server_location }}
      server_name: ${{ steps.test.outputs.server_name }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install speedtest-cli
        run: |
          sudo apt-get update
          sudo apt-get install -y speedtest-cli

      - name: Run network bandwidth test
        id: test
        run: |
          echo "Running network bandwidth test..."

          speedtest-cli --json > speedtest_results.json

          DOWNLOAD_SPEED_BPS=$(jq -r '.download // "0"' speedtest_results.json)
          UPLOAD_SPEED_BPS=$(jq -r '.upload // "0"' speedtest_results.json)
          PING_MS=$(jq -r '.ping // "0"' speedtest_results.json)
          SERVER_NAME=$(jq -r '.server.name // "Unknown"' speedtest_results.json)
          SERVER_LOCATION=$(jq -r '.server.country // "Unknown"' speedtest_results.json)

          DOWNLOAD_SPEED_MBPS="0"
          UPLOAD_SPEED_MBPS="0"

          if [[ "$DOWNLOAD_SPEED_BPS" != "0" && "$DOWNLOAD_SPEED_BPS" != "null" ]]; then
            DOWNLOAD_SPEED_MBPS=$(echo "scale=2; $DOWNLOAD_SPEED_BPS / 8000000" | bc -l 2>/dev/null || echo "0")
          fi
          if [[ "$UPLOAD_SPEED_BPS" != "0" && "$UPLOAD_SPEED_BPS" != "null" ]]; then
            UPLOAD_SPEED_MBPS=$(echo "scale=2; $UPLOAD_SPEED_BPS / 8000000" | bc -l 2>/dev/null || echo "0")
          fi
          if [[ "$PING_MS" != "null" && "$PING_MS" != "0" ]]; then
            PING_MS=$(echo "scale=2; $PING_MS / 1" | bc -l 2>/dev/null || echo "0")
          fi

          echo "download_speed_mbps=$DOWNLOAD_SPEED_MBPS" >> $GITHUB_OUTPUT
          echo "upload_speed_mbps=$UPLOAD_SPEED_MBPS" >> $GITHUB_OUTPUT
          echo "ping_ms=$PING_MS" >> $GITHUB_OUTPUT
          echo "server_location=$SERVER_LOCATION" >> $GITHUB_OUTPUT
          echo "server_name=$SERVER_NAME" >> $GITHUB_OUTPUT

          echo "### Network Bandwidth Test Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Download speed:** ${DOWNLOAD_SPEED_MBPS} MB/s" >> $GITHUB_STEP_SUMMARY
          echo "- **Upload speed:** ${UPLOAD_SPEED_MBPS} MB/s" >> $GITHUB_STEP_SUMMARY
          echo "- **Ping:** ${PING_MS} ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Server:** $SERVER_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Server Location:** $SERVER_LOCATION" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload speedtest results
        uses: actions/upload-artifact@v4
        with:
          name: network-bandwidth-results-${{ matrix.runner }}
          path: speedtest_results.json
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.network.download_mb_s"
              value: ${{ steps.test.outputs.download_speed_mbps || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.network.upload_mb_s"
              value: ${{ steps.test.outputs.upload_speed_mbps || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.network.ping_ms"
              value: ${{ steps.test.outputs.ping_ms || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  rsync_performance_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      rsync_time: ${{ steps.timing.outputs.rsync_time }}
      total_time: ${{ steps.timing.outputs.total_time }}
      files_copied: ${{ steps.timing.outputs.files_copied }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Run rsync performance test
        id: timing
        run: |
          SYNC_SUBTREE="${{ github.event.inputs.sync_subtree || '/usr' }}"
          SAMPLE_PERCENTAGE="${{ github.event.inputs.sample_percentage || '3' }}"

          TOTAL_START_TIME=$(date +%s)

          sudo find "$SYNC_SUBTREE" -type f > /tmp/source_files.txt 2>/dev/null || true
          TOTAL_SOURCE_FILES=$(wc -l < /tmp/source_files.txt || echo "0")

          if [[ $TOTAL_SOURCE_FILES -gt 0 ]]; then
            FILES_TO_SAMPLE=$((TOTAL_SOURCE_FILES * SAMPLE_PERCENTAGE / 100))
            if [[ $FILES_TO_SAMPLE -lt 1 ]]; then FILES_TO_SAMPLE=1; fi
            shuf /tmp/source_files.txt -o /tmp/shuffled_source_files.txt
            head -n $FILES_TO_SAMPLE /tmp/shuffled_source_files.txt > /tmp/sampled_files.txt
            FILES_COPIED=$FILES_TO_SAMPLE
          else
            FILES_COPIED=0
          fi

          RSYNC_START_TIME=$(date +%s)
          sudo mkdir -p /tmp/rsync_test_dst
          sudo rsync -av --files-from=/tmp/sampled_files.txt / /tmp/rsync_test_dst/ > /tmp/rsync_output.txt 2>/dev/null || true
          RSYNC_END_TIME=$(date +%s)
          RSYNC_TIME=$((RSYNC_END_TIME - RSYNC_START_TIME))

          TOTAL_END_TIME=$(date +%s)
          TOTAL_TIME=$((TOTAL_END_TIME - TOTAL_START_TIME))

          echo "rsync_time=$RSYNC_TIME" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "files_copied=$FILES_COPIED" >> $GITHUB_OUTPUT

          echo "### Rsync Performance Test Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source directory:** $SYNC_SUBTREE" >> $GITHUB_STEP_SUMMARY
          echo "- **Sample percentage:** $SAMPLE_PERCENTAGE%" >> $GITHUB_STEP_SUMMARY
          echo "- **Files copied:** $FILES_COPIED" >> $GITHUB_STEP_SUMMARY
          echo "- **Rsync time:** ${RSYNC_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Total time:** ${TOTAL_TIME}s" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.rsync.time_s"
              value: ${{ steps.timing.outputs.rsync_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

