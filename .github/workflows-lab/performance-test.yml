# This is a basic workflow to help you get started with Actions

name: Ubuntu-latest 4-cores Benchmark

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    strategy:
      matrix:
        mult: [1,2,3,4,5]
        mult2: [1,2,3,4]
        label: [ubuntu-latest]
    # The type of runner that the job will run on
    runs-on: ${{ matrix.label }}
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Runs a single command using the runners shell
      - name: Inspect block devices and queue attributes
        run: |
          for d in /sys/block/*; do
            echo "device: $(basename "$d")"
            if [ -d "$d/queue" ]; then
              echo "queue entries:"
              ls "$d/queue" | sed 's/^/  /'
              if [ -e "$d/queue/max_sectors_kb" ]; then
                echo "max_sectors_kb=$(cat "$d/queue/max_sectors_kb")"
              else
                echo "max_sectors_kb not present"
              fi
            else
              echo "no queue directory"
            fi
            echo
          done
      - name: Download tools
        run: |
          sudo apt update
          sudo apt install -y sysbench 
          sysbench --version

      - name: Single Thread Benchmark CPU
        run: |
          sysbench cpu --threads=1 --max-time=60 run

      - name: Single Thread Benchmark Memory
        run: |
          sysbench memory --memory-total-size=500M --threads=1 run

      - name: Single Thread Benchmark File IO
        run: |
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=1 prepare
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=1 run
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=1 cleanup

      - name: Multi-Thread Benchmark CPU
        run: |
          sysbench cpu --threads=4 --max-time=60 run

      - name: Multi-Thread Benchmark Memory
        run: |
          sysbench memory --memory-total-size=500M --threads=4 run

      - name: Multi-Thread Benchmark File IO
        run: |
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=4 prepare
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=4 run
          sysbench fileio --file-total-size=1G --file-test-mode=rndrw --threads=4 cleanup
