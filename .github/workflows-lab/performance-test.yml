          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "image_size_mb=$IMAGE_SIZE_MB" >> $GITHUB_OUTPUT
          echo "build_speed_mb_per_min=$BUILD_SPEED_MB_PER_MIN" >> $GITHUB_OUTPUT

          echo "### Docker Build Performance Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ steps.clone_timing.outputs.docker_repo }}" >> $GITHUB_STEP_SUMMARY
