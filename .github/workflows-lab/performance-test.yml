name: Runner Performance Testing
run-name: Runner Performance Testing

on:
  workflow_dispatch:
    inputs:
      test_duration:
        description: 'Test duration in seconds'
        required: false
        default: '60'
        type: string
      file_size:
        description: 'File size for I/O tests (GB)'
        required: false
        default: '2'
        type: string
      docker_repo:
        description: 'Docker repository to build (org/repo format)'
        required: false
        default: 'mastodon/mastodon'
        type: string
      checkout_repo:
        description: 'Repository to checkout for performance testing (org/repo format)'
        required: false
        default: 'torvalds/linux'
        type: string
      matrix_size:
        description: 'Number of parallel jobs for queue time testing'
        required: false
        default: '10'
        type: string
      sync_subtree:
        description: 'Directory subtree to copy for rsync testing'
        required: false
        default: '/usr'
        type: string
      sample_percentage:
        description: 'Percentage of files to sample from source directory for rsync test'
        required: false
        default: '3'
        type: string
      apt_package:
        description: 'APT package to install for package installation timing test'
        required: false
        default: 'texlive-full'
        type: string
      nodejs_repo:
        description: 'Node.js repository to build (org/repo format)'
        required: false
        default: 'microsoft/monaco-editor'
        type: string
      go_repo:
        description: 'Go repository to build (org/repo format)'
        required: false
        default: 'kubernetes/kubernetes'
        type: string

  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes

env:
  TEST_DURATION: ${{ github.event.inputs.test_duration || '60' }}
  FILE_SIZE: ${{ github.event.inputs.file_size || '2' }}

permissions:
  actions: read
  contents: read

jobs:
  system_info:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    outputs:
      cpu_cores: ${{ steps.sysinfo.outputs.cpu_cores }}
      total_memory: ${{ steps.sysinfo.outputs.total_memory }}
      runner_os: ${{ steps.sysinfo.outputs.runner_os }}
      runner_arch: ${{ steps.sysinfo.outputs.runner_arch }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Get system information
        id: sysinfo
        run: |
          echo "cpu_cores=$(nproc)" >> $GITHUB_OUTPUT
          echo "total_memory=$(free -m | awk 'NR==2{printf "%.1fGB", $2/1024}')" >> $GITHUB_OUTPUT
          echo "runner_os=$(uname -s)" >> $GITHUB_OUTPUT
          echo "runner_arch=$(uname -m)" >> $GITHUB_OUTPUT

          echo "### System Information (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CPU Cores:** $(nproc)" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Memory:** $(free -m | awk 'NR==2{printf "%.1fGB", $2/1024}')" >> $GITHUB_STEP_SUMMARY
          echo "- **OS:** $(uname -s)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture:** $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- **Kernel:** $(uname -r)" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Get hardware information
        run: |
          sudo apt update
          sudo apt install -y lshw
          sudo lshw -json > hardware_info.json

          echo "### Hardware Information" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          sudo lshw -short >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload hardware information
        uses: actions/upload-artifact@v4
        with:
          name: hardware-info-${{ github.run_id }}-${{ matrix.runner }}
          path: hardware_info.json

  single_core_cpu:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      events_per_second: ${{ steps.test.outputs.events_per_second }}
      total_time: ${{ steps.test.outputs.total_time }}
      min_latency: ${{ steps.test.outputs.min_latency }}
      avg_latency: ${{ steps.test.outputs.avg_latency }}
      max_latency: ${{ steps.test.outputs.max_latency }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install sysbench
        run: |
          sudo apt-get update
          sudo apt-get install -y sysbench

      - name: Run single-core CPU test
        id: test
        run: |
          echo "Running single-core CPU performance test..."

          sysbench cpu --cpu-max-prime=20000 --threads=1 --time=${{ env.TEST_DURATION }} run > cpu_single_results.txt

          EVENTS_PER_SEC=$(grep "events per second:" cpu_single_results.txt | awk '{print $4}')
          TOTAL_TIME=$(grep "total time:" cpu_single_results.txt | awk '{print $3}' | tr -d 's')
          MIN_LATENCY=$(grep "min:" cpu_single_results.txt | awk '{print $2}')
          AVG_LATENCY=$(grep "avg:" cpu_single_results.txt | awk '{print $2}')
          MAX_LATENCY=$(grep "max:" cpu_single_results.txt | awk '{print $2}')

          echo "events_per_second=$EVENTS_PER_SEC" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "min_latency=$MIN_LATENCY" >> $GITHUB_OUTPUT
          echo "avg_latency=$AVG_LATENCY" >> $GITHUB_OUTPUT
          echo "max_latency=$MAX_LATENCY" >> $GITHUB_OUTPUT

          echo "### Single-Core CPU Test Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Events per second:** $EVENTS_PER_SEC" >> $GITHUB_STEP_SUMMARY
          echo "- **Total time:** ${TOTAL_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Min latency:** ${MIN_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Avg latency:** ${AVG_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Max latency:** ${MAX_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload single-core results
        uses: actions/upload-artifact@v4
        with:
          name: single-core-cpu-results-${{ matrix.runner }}
          path: cpu_single_results.txt
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.single_core.events_per_second"
              value: ${{ steps.test.outputs.events_per_second }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.single_core.avg_latency_ms"
              value: ${{ steps.test.outputs.avg_latency }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.single_core.max_latency_ms"
              value: ${{ steps.test.outputs.max_latency }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  multi_core_cpu:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      events_per_second: ${{ steps.test.outputs.events_per_second }}
      total_time: ${{ steps.test.outputs.total_time }}
      min_latency: ${{ steps.test.outputs.min_latency }}
      avg_latency: ${{ steps.test.outputs.avg_latency }}
      max_latency: ${{ steps.test.outputs.max_latency }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install sysbench
        run: |
          sudo apt-get update
          sudo apt-get install -y sysbench

      - name: Run multi-core CPU test
        id: test
        run: |
          CORES=$(nproc)
          echo "Running multi-core CPU performance test with $CORES threads..."

          sysbench cpu --cpu-max-prime=20000 --threads=$CORES --time=${{ env.TEST_DURATION }} run > cpu_multi_results.txt

          EVENTS_PER_SEC=$(grep "events per second:" cpu_multi_results.txt | awk '{print $4}')
          TOTAL_TIME=$(grep "total time:" cpu_multi_results.txt | awk '{print $3}' | tr -d 's')
          MIN_LATENCY=$(grep "min:" cpu_multi_results.txt | awk '{print $2}')
          AVG_LATENCY=$(grep "avg:" cpu_multi_results.txt | awk '{print $2}')
          MAX_LATENCY=$(grep "max:" cpu_multi_results.txt | awk '{print $2}')

          echo "events_per_second=$EVENTS_PER_SEC" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "min_latency=$MIN_LATENCY" >> $GITHUB_OUTPUT
          echo "avg_latency=$AVG_LATENCY" >> $GITHUB_OUTPUT
          echo "max_latency=$MAX_LATENCY" >> $GITHUB_OUTPUT

          echo "### Multi-Core CPU Test Results (${{ matrix.runner }} - $CORES cores)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Events per second:** $EVENTS_PER_SEC" >> $GITHUB_STEP_SUMMARY
          echo "- **Total time:** ${TOTAL_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Min latency:** ${MIN_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Avg latency:** ${AVG_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          echo "- **Max latency:** ${MAX_LATENCY}ms" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload multi-core results
        uses: actions/upload-artifact@v4
        with:
          name: multi-core-cpu-results-${{ matrix.runner }}
          path: cpu_multi_results.txt
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.multi_core.events_per_second"
              value: ${{ steps.test.outputs.events_per_second }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.multi_core.avg_latency_ms"
              value: ${{ steps.test.outputs.avg_latency }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.cpu.multi_core.max_latency_ms"
              value: ${{ steps.test.outputs.max_latency }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  memory_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      total_ops: ${{ steps.test.outputs.total_ops }}
      ops_per_second: ${{ steps.test.outputs.ops_per_second }}
      transferred_mb: ${{ steps.test.outputs.transferred_mb }}
      transfer_rate: ${{ steps.test.outputs.transfer_rate }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install sysbench
        run: |
          sudo apt-get update
          sudo apt-get install -y sysbench

      - name: Run memory performance test
        id: test
        run: |
          echo "Running memory performance test..."

          sysbench memory --memory-block-size=1K --memory-total-size=10G --threads=4 --time=${{ env.TEST_DURATION }} run > memory_results.txt

          TOTAL_OPS=$(grep "Total operations:" memory_results.txt | awk '{print $3}')
          OPS_PER_SEC=$(grep "Total operations:" memory_results.txt | awk -F'[ ()]+' '{print $4}')
          TRANSFERRED_MB=$(grep "transferred" memory_results.txt | awk '{print $1}' | head -1)
          TRANSFER_RATE=$(grep "transferred" memory_results.txt | awk -F'[ ()]+' '{print $4}' | head -1 | tr -d '()')

          echo "total_ops=$TOTAL_OPS" >> $GITHUB_OUTPUT
          echo "ops_per_second=$OPS_PER_SEC" >> $GITHUB_OUTPUT
          echo "transferred_mb=$TRANSFERRED_MB" >> $GITHUB_OUTPUT
          echo "transfer_rate=$TRANSFER_RATE" >> $GITHUB_OUTPUT

          echo "### Memory Test Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total operations:** $TOTAL_OPS" >> $GITHUB_STEP_SUMMARY
          echo "- **Operations per second:** $OPS_PER_SEC" >> $GITHUB_STEP_SUMMARY
          echo "- **Data transferred:** ${TRANSFERRED_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Transfer rate:** $TRANSFER_RATE" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload memory results
        uses: actions/upload-artifact@v4
        with:
          name: memory-test-results-${{ matrix.runner }}
          path: memory_results.txt
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.memory.ops_per_second"
              value: ${{ steps.test.outputs.ops_per_second }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.memory.transfer_rate_mb_s"
              value: ${{ steps.test.outputs.transfer_rate || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  fio_disk_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      sequential_read_iops: ${{ steps.test.outputs.sequential_read_iops }}
      sequential_write_iops: ${{ steps.test.outputs.sequential_write_iops }}
      random_read_iops: ${{ steps.test.outputs.random_read_iops }}
      random_write_iops: ${{ steps.test.outputs.random_write_iops }}
      sequential_read_bandwidth: ${{ steps.test.outputs.sequential_read_bandwidth }}
      sequential_write_bandwidth: ${{ steps.test.outputs.sequential_write_bandwidth }}
      random_read_latency: ${{ steps.test.outputs.random_read_latency }}
      random_write_latency: ${{ steps.test.outputs.random_write_latency }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install FIO
        run: |
          sudo apt-get update
          sudo apt-get install -y fio

      - name: Run FIO disk performance tests
        id: test
        run: |
          echo "Running FIO disk performance tests..."

          mkdir -p fio_test
          cd fio_test

          fio --name=seq_read --ioengine=libaio --iodepth=32 --rw=read --bs=1M --direct=1 \
              --size=${{ env.FILE_SIZE }}G --numjobs=1 --runtime=${{ env.TEST_DURATION }} --group_reporting \
              --output-format=json --output=seq_read.json

          fio --name=seq_write --ioengine=libaio --iodepth=32 --rw=write --bs=1M --direct=1 \
              --size=${{ env.FILE_SIZE }}G --numjobs=1 --runtime=${{ env.TEST_DURATION }} --group_reporting \
              --output-format=json --output=seq_write.json

          fio --name=rand_read --ioengine=libaio --iodepth=32 --rw=randread --bs=4K --direct=1 \
              --size=${{ env.FILE_SIZE }}G --numjobs=1 --runtime=${{ env.TEST_DURATION }} --group_reporting \
              --output-format=json --output=rand_read.json

          fio --name=rand_write --ioengine=libaio --iodepth=32 --rw=randwrite --bs=4K --direct=1 \
              --size=${{ env.FILE_SIZE }}G --numjobs=1 --runtime=${{ env.TEST_DURATION }} --group_reporting \
              --output-format=json --output=rand_write.json

          SEQ_READ_IOPS=$(jq -r '.jobs[0].read.iops // "0"' seq_read.json 2>/dev/null | cut -d'.' -f1)
          SEQ_WRITE_IOPS=$(jq -r '.jobs[0].write.iops // "0"' seq_write.json 2>/dev/null | cut -d'.' -f1)
          RAND_READ_IOPS=$(jq -r '.jobs[0].read.iops // "0"' rand_read.json 2>/dev/null | cut -d'.' -f1)
          RAND_WRITE_IOPS=$(jq -r '.jobs[0].write.iops // "0"' rand_write.json 2>/dev/null | cut -d'.' -f1)

          SEQ_READ_BW=$(jq -r '.jobs[0].read.bw // "0"' seq_read.json 2>/dev/null | cut -d'.' -f1)
          SEQ_WRITE_BW=$(jq -r '.jobs[0].write.bw // "0"' seq_write.json 2>/dev/null | cut -d'.' -f1)

          RAND_READ_LAT=$(jq -r '.jobs[0].read.lat_ns.mean // "0"' rand_read.json 2>/dev/null)
          RAND_WRITE_LAT=$(jq -r '.jobs[0].write.lat_ns.mean // "0"' rand_write.json 2>/dev/null)

          if [[ "$RAND_READ_LAT" != "0" ]]; then
            RAND_READ_LAT=$(echo "scale=2; $RAND_READ_LAT / 1000" | bc -l 2>/dev/null || echo "0")
          fi
          if [[ "$RAND_WRITE_LAT" != "0" ]]; then
            RAND_WRITE_LAT=$(echo "scale=2; $RAND_WRITE_LAT / 1000" | bc -l 2>/dev/null || echo "0")
          fi
          if [[ "$SEQ_READ_BW" != "0" ]]; then
            SEQ_READ_BW=$(echo "scale=2; $SEQ_READ_BW / 1024" | bc -l 2>/dev/null || echo "0")
          fi
          if [[ "$SEQ_WRITE_BW" != "0" ]]; then
            SEQ_WRITE_BW=$(echo "scale=2; $SEQ_WRITE_BW / 1024" | bc -l 2>/dev/null || echo "0")
          fi

          echo "sequential_read_iops=$SEQ_READ_IOPS" >> $GITHUB_OUTPUT
          echo "sequential_write_iops=$SEQ_WRITE_IOPS" >> $GITHUB_OUTPUT
          echo "random_read_iops=$RAND_READ_IOPS" >> $GITHUB_OUTPUT
          echo "random_write_iops=$RAND_WRITE_IOPS" >> $GITHUB_OUTPUT
          echo "sequential_read_bandwidth=$SEQ_READ_BW" >> $GITHUB_OUTPUT
