    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      package_name: ${{ steps.test.outputs.package_name }}
      install_time: ${{ steps.test.outputs.install_time }}
      package_size_mb: ${{ steps.test.outputs.package_size_mb }}
      download_speed_mb_per_s: ${{ steps.test.outputs.download_speed_mb_per_s }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Test APT package installation performance
        id: test
        run: |
          APT_PACKAGE="${{ github.event.inputs.apt_package || 'texlive-full' }}"

          sudo apt-get update

          PKG_SIZE_KB=$(apt-cache show "$APT_PACKAGE" | grep "^Size: " | head -n1 | awk '{print $2}')
          if [[ -n "$PKG_SIZE_KB" ]]; then
            PKG_SIZE_MB=$(echo "scale=2; $PKG_SIZE_KB / 1024 / 1024" | bc -l)
          else
            PKG_SIZE_MB="unknown"
          fi

          START_TIME=$(date +%s.%N)
          sudo apt-get install -y "$APT_PACKAGE"
          END_TIME=$(date +%s.%N)

          INSTALL_TIME=$(echo "$END_TIME - $START_TIME" | bc -l | awk '{printf "%.2f", $1}')

          if [[ "$PKG_SIZE_MB" != "unknown" && $(echo "$PKG_SIZE_MB > 0" | bc -l) == "1" ]]; then
            DOWNLOAD_SPEED=$(echo "scale=2; $PKG_SIZE_MB / $INSTALL_TIME" | bc -l)
          else
            DOWNLOAD_SPEED="unknown"
          fi

          echo "package_name=$APT_PACKAGE" >> $GITHUB_OUTPUT
          echo "install_time=$INSTALL_TIME" >> $GITHUB_OUTPUT
          echo "package_size_mb=$PKG_SIZE_MB" >> $GITHUB_OUTPUT
          echo "download_speed_mb_per_s=$DOWNLOAD_SPEED" >> $GITHUB_OUTPUT

          echo "### APT Package Installation Test Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package:** $APT_PACKAGE" >> $GITHUB_STEP_SUMMARY
          echo "- **Installation time:** ${INSTALL_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Package size:** ${PKG_SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          if [[ "$DOWNLOAD_SPEED" != "unknown" ]]; then
            echo "- **Effective download speed:** ${DOWNLOAD_SPEED} MB/s" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.apt.install_time_s"
              value: ${{ steps.test.outputs.install_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
                - "package:${{ steps.test.outputs.package_name }}"

