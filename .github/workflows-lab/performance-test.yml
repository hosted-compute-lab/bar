          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Clone and measure build performance
        id: clone_timing
        run: |
          GO_REPO="${{ github.event.inputs.go_repo || 'kubernetes/kubernetes' }}"
          REPO_NAME=$(echo "$GO_REPO" | cut -d'/' -f2)

          echo "go_repo=$GO_REPO" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

          echo "### Go Build Performance Test (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** $GO_REPO" >> $GITHUB_STEP_SUMMARY

      - name: Time Go build operations
        id: timing
        run: |
          GO_REPO="${{ github.event.inputs.go_repo || 'kubernetes/kubernetes' }}"
          REPO_NAME=$(echo "$GO_REPO" | cut -d'/' -f2)

          GO_VERSION=$(go version | awk '{print $3}')
          echo "go_version=$GO_VERSION" >> $GITHUB_OUTPUT

          TOTAL_START=$(date +%s.%N)

          CLONE_START=$(date +%s.%N)
          git clone --depth=1 https://github.com/$GO_REPO.git $REPO_NAME
          CLONE_END=$(date +%s.%N)
          CLONE_TIME=$(echo "$CLONE_END - $CLONE_START" | bc -l | awk '{printf "%.2f", $1}')
          echo "clone_time=$CLONE_TIME" >> $GITHUB_OUTPUT

          cd $REPO_NAME

          if [[ -f "Makefile" ]]; then
            BUILD_METHOD="make"
            BUILD_START=$(date +%s.%N)
            make || { BUILD_METHOD="go build (make failed)"; go build ./... 2>/dev/null || true; }
            BUILD_END=$(date +%s.%N)
          elif [[ -f "go.mod" ]]; then
            BUILD_METHOD="go build"
            BUILD_START=$(date +%s.%N)
            go build ./... 2>/dev/null || go build -v ./cmd/... 2>/dev/null || go build -v . 2>/dev/null || true
            BUILD_END=$(date +%s.%N)
          else
            BUILD_METHOD="go build (basic)"
            BUILD_START=$(date +%s.%N)
            go build -v . 2>/dev/null || true
            BUILD_END=$(date +%s.%N)
          fi

          BUILD_TIME=$(echo "$BUILD_END - $BUILD_START" | bc -l | awk '{printf "%.2f", $1}')
          echo "build_method=$BUILD_METHOD" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

          TOTAL_END=$(date +%s.%N)
          TOTAL_TIME=$(echo "$TOTAL_END - $TOTAL_START" | bc -l | awk '{printf "%.2f", $1}')
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT

          echo "- **Go version:** $GO_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Clone time:** ${CLONE_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Build method:** $BUILD_METHOD" >> $GITHUB_STEP_SUMMARY
          echo "- **Build time:** ${BUILD_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Total time:** ${TOTAL_TIME}s" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

          cd ..
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.build.go.build_time_s"
              value: ${{ steps.timing.outputs.build_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.build.go.total_time_s"
              value: ${{ steps.timing.outputs.total_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  performance_summary:
    runs-on: ubuntu-latest
    needs: [system_info, single_core_cpu, multi_core_cpu, memory_test, fio_disk_test, artifact_upload_test, artifact_download_test, cache_upload_test, cache_download_test, checkout_performance_test, docker_build_test, docker_build_test_cached, finish-queue-test, network_bandwidth_test, rsync_performance_test, apt_package_install_test, nodejs_build_test, go_build_test]
    if: always()
    steps:
      - name: Generate performance summary
        run: |
          echo "# 🚀 Runner Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Test Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Test Duration:** ${{ env.TEST_DURATION }} seconds per test" >> $GITHUB_STEP_SUMMARY
          echo "**Runners tested:** ubuntu-latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## 📊 Performance Results" >> $GITHUB_STEP_SUMMARY
          echo "> Results for each test appear above in the individual job summaries, broken down per runner." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### ✅ Job Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| System Info | ${{ needs.system_info.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Single-Core CPU | ${{ needs.single_core_cpu.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Multi-Core CPU | ${{ needs.multi_core_cpu.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory | ${{ needs.memory_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| FIO Disk | ${{ needs.fio_disk_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Upload | ${{ needs.artifact_upload_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Download | ${{ needs.artifact_download_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Save | ${{ needs.cache_upload_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cache Restore | ${{ needs.cache_download_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkout | ${{ needs.checkout_performance_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker_build_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build (Cached) | ${{ needs.docker_build_test_cached.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Queue Test | ${{ needs.finish-queue-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Network Bandwidth | ${{ needs.network_bandwidth_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rsync | ${{ needs.rsync_performance_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APT Install | ${{ needs.apt_package_install_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Build | ${{ needs.nodejs_build_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Go Build | ${{ needs.go_build_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated by GitHub Actions Performance Testing Workflow*" >> $GITHUB_STEP_SUMMARY

      - name: Create performance report artifact
        run: |
          mkdir -p performance-report

          cat > performance-report/summary.json << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "runners_tested": ["ubuntu-latest"],
            "inputs": {
              "file_size": "${{ github.event.inputs.file_size || '2' }}",
              "docker_repo": "${{ github.event.inputs.docker_repo || 'mastodon/mastodon' }}",
              "checkout_repo": "${{ github.event.inputs.checkout_repo || 'torvalds/linux' }}",
              "matrix_size": "${{ github.event.inputs.matrix_size || '10' }}",
              "sync_subtree": "${{ github.event.inputs.sync_subtree || '/usr' }}",
              "sample_percentage": "${{ github.event.inputs.sample_percentage || '3' }}",
              "apt_package": "${{ github.event.inputs.apt_package || 'texlive-full' }}",
              "nodejs_repo": "${{ github.event.inputs.nodejs_repo || 'microsoft/monaco-editor' }}",
              "go_repo": "${{ github.event.inputs.go_repo || 'kubernetes/kubernetes' }}"
            },
            "job_results": {
              "system_info": "${{ needs.system_info.result }}",
              "single_core_cpu": "${{ needs.single_core_cpu.result }}",
              "multi_core_cpu": "${{ needs.multi_core_cpu.result }}",
              "memory_test": "${{ needs.memory_test.result }}",
              "fio_disk_test": "${{ needs.fio_disk_test.result }}",
              "artifact_upload_test": "${{ needs.artifact_upload_test.result }}",
              "artifact_download_test": "${{ needs.artifact_download_test.result }}",
              "cache_upload_test": "${{ needs.cache_upload_test.result }}",
              "cache_download_test": "${{ needs.cache_download_test.result }}",
              "checkout_performance_test": "${{ needs.checkout_performance_test.result }}",
              "docker_build_test": "${{ needs.docker_build_test.result }}",
              "docker_build_test_cached": "${{ needs.docker_build_test_cached.result }}",
              "finish_queue_test": "${{ needs.finish-queue-test.result }}",
              "network_bandwidth_test": "${{ needs.network_bandwidth_test.result }}",
              "rsync_performance_test": "${{ needs.rsync_performance_test.result }}",
              "apt_package_install_test": "${{ needs.apt_package_install_test.result }}",
              "nodejs_build_test": "${{ needs.nodejs_build_test.result }}",
              "go_build_test": "${{ needs.go_build_test.result }}"
            }
          }
          EOF

      - name: Upload performance summary
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: performance-report/
