      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Setup timing
        id: clone_timing
        run: |
          TOTAL_START_TIME=$(date +%s)
          NODEJS_REPO="${{ github.event.inputs.nodejs_repo || 'microsoft/monaco-editor' }}"
          REPO_NAME=$(echo $NODEJS_REPO | cut -d'/' -f2)
          CLONE_START_TIME=$(date +%s)

          echo "clone_start_time=$CLONE_START_TIME" >> $GITHUB_OUTPUT
          echo "total_start_time=$TOTAL_START_TIME" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "nodejs_repo=$NODEJS_REPO" >> $GITHUB_OUTPUT

      - name: Checkout Node.js repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.clone_timing.outputs.nodejs_repo }}
          path: ${{ steps.clone_timing.outputs.repo_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Calculate performance metrics
        id: timing
        run: |
          TOTAL_START_TIME=${{ steps.clone_timing.outputs.total_start_time }}
          CLONE_START_TIME=${{ steps.clone_timing.outputs.clone_start_time }}
          REPO_NAME="${{ steps.clone_timing.outputs.repo_name }}"

          CLONE_END_TIME=$(date +%s)
          CLONE_TIME=$((CLONE_END_TIME - CLONE_START_TIME))

          cd $REPO_NAME

          PACKAGE_MANAGER="npm"
          if [[ -f "yarn.lock" ]]; then
            PACKAGE_MANAGER="yarn"
          elif [[ -f "pnpm-lock.yaml" ]]; then
            PACKAGE_MANAGER="pnpm"
            npm install -g pnpm
          fi

          DEPENDENCIES_COUNT=0
          if [[ -f "package.json" ]]; then
            DEPENDENCIES_COUNT=$(jq -r '(.dependencies // {}) + (.devDependencies // {}) | length' package.json 2>/dev/null || echo "0")
          fi

          INSTALL_START_TIME=$(date +%s)
          case $PACKAGE_MANAGER in
            "yarn") yarn install --frozen-lockfile ;;
            "pnpm") pnpm install --frozen-lockfile ;;
            *) npm ci ;;
          esac
          INSTALL_END_TIME=$(date +%s)
          INSTALL_TIME=$((INSTALL_END_TIME - INSTALL_START_TIME))

          BUILD_START_TIME=$(date +%s)
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            case $PACKAGE_MANAGER in
              "yarn") yarn build ;;
              "pnpm") pnpm run build ;;
              *) npm run build ;;
            esac
          else
            echo "No build script found, skipping build step"
          fi
          BUILD_END_TIME=$(date +%s)
          BUILD_TIME=$((BUILD_END_TIME - BUILD_START_TIME))

          TOTAL_END_TIME=$(date +%s)
          TOTAL_TIME=$((TOTAL_END_TIME - TOTAL_START_TIME))

          echo "clone_time=$CLONE_TIME" >> $GITHUB_OUTPUT
          echo "install_time=$INSTALL_TIME" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "total_time=$TOTAL_TIME" >> $GITHUB_OUTPUT
          echo "package_manager=$PACKAGE_MANAGER" >> $GITHUB_OUTPUT
          echo "dependencies_count=$DEPENDENCIES_COUNT" >> $GITHUB_OUTPUT

          echo "### Node.js Build Performance Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ steps.clone_timing.outputs.nodejs_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Package Manager:** $PACKAGE_MANAGER" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependencies Count:** $DEPENDENCIES_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Clone time:** ${CLONE_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Install time:** ${INSTALL_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Build time:** ${BUILD_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Total time:** ${TOTAL_TIME}s" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi

          cd ..
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.build.nodejs.build_time_s"
              value: ${{ steps.timing.outputs.build_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.build.nodejs.install_time_s"
              value: ${{ steps.timing.outputs.install_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

