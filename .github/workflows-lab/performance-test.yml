  artifact_upload_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      file_generation_time: ${{ steps.generate.outputs.file_generation_time }}
      upload_time: ${{ steps.upload_timing.outputs.upload_time }}
      file_size_mb: ${{ steps.generate.outputs.file_size_mb }}
      upload_speed_mbps: ${{ steps.compute_stats.outputs.upload_speed_mbps }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Generate test file
        id: generate
        run: |
          FILE_SIZE_GB=${{ env.FILE_SIZE }}
          echo "Generating ${FILE_SIZE_GB}GB file with random data..."

          COUNT_MB=$((FILE_SIZE_GB * 1024))

          START_TIME=$(date +%s)
          dd if=/dev/urandom of=test_data_${FILE_SIZE_GB}gb.bin bs=1M count=$COUNT_MB status=progress
          END_TIME=$(date +%s)

          FILE_GENERATION_TIME=$((END_TIME - START_TIME))
          FILE_SIZE_MB=$(stat -f%z test_data_${FILE_SIZE_GB}gb.bin 2>/dev/null || stat -c%s test_data_${FILE_SIZE_GB}gb.bin 2>/dev/null || echo 0)
          FILE_SIZE_MB=$((FILE_SIZE_MB / 1024 / 1024))

          echo "file_generation_time=$FILE_GENERATION_TIME" >> $GITHUB_OUTPUT
          echo "file_size_mb=$FILE_SIZE_MB" >> $GITHUB_OUTPUT

          echo "### File Generation Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **File generation time:** ${FILE_GENERATION_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **File size:** ${FILE_SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY

          echo $(date +%s) > /tmp/upload_start_time

      - name: Upload test file
        uses: actions/upload-artifact@v4
        with:
          name: test-data-${{ env.FILE_SIZE }}gb-${{ matrix.runner }}
          path: test_data_${{ env.FILE_SIZE }}gb.bin
          retention-days: 1
          compression-level: 0

      - name: Record upload timing
        id: upload_timing
        run: |
          UPLOAD_END_TIME=$(date +%s)
          UPLOAD_START_TIME=$(cat /tmp/upload_start_time 2>/dev/null || echo $(date +%s))
          UPLOAD_TIME=$((UPLOAD_END_TIME - UPLOAD_START_TIME))

          echo "upload_time=$UPLOAD_TIME" >> $GITHUB_OUTPUT

          echo "### Upload Timing Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Upload time:** ${UPLOAD_TIME}s" >> $GITHUB_STEP_SUMMARY

      - name: Compute upload statistics
        id: compute_stats
        run: |
          FILE_SIZE_MB=${{ steps.generate.outputs.file_size_mb }}
          UPLOAD_TIME=${{ steps.upload_timing.outputs.upload_time }}

          UPLOAD_SPEED_MBPS=""
          if [[ $UPLOAD_TIME -gt 0 && -n "$FILE_SIZE_MB" && "$FILE_SIZE_MB" -gt 0 ]]; then
            UPLOAD_SPEED_MBPS=$(echo "scale=2; $FILE_SIZE_MB / $UPLOAD_TIME" | bc -l 2>/dev/null || echo "")
          fi

          echo "upload_speed_mbps=$UPLOAD_SPEED_MBPS" >> $GITHUB_OUTPUT

          echo "### Upload Statistics (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$UPLOAD_SPEED_MBPS" ]]; then
            echo "- **Upload speed:** ${UPLOAD_SPEED_MBPS} MB/s" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Upload speed:** Unable to calculate" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.artifact.upload_speed_mb_s"
              value: ${{ steps.compute_stats.outputs.upload_speed_mbps || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.artifact.upload_time_s"
              value: ${{ steps.upload_timing.outputs.upload_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

