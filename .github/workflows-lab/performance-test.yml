          echo "- **Random Read Latency:** ${RAND_READ_LAT}μs" >> $GITHUB_STEP_SUMMARY
          echo "- **Random Write Latency:** ${RAND_WRITE_LAT}μs" >> $GITHUB_STEP_SUMMARY
