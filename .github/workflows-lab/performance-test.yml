          VERIFY_START_TIME=$(date +%s)

          FILE_SIZE_GB=${{ env.FILE_SIZE }}
          if [[ -f "cache_test_data/test_data_${FILE_SIZE_GB}gb_cache.bin" ]]; then
            FILE_SIZE_MB=$(stat -f%z cache_test_data/test_data_${FILE_SIZE_GB}gb_cache.bin 2>/dev/null || stat -c%s cache_test_data/test_data_${FILE_SIZE_GB}gb_cache.bin 2>/dev/null || echo 0)
            FILE_SIZE_MB=$((FILE_SIZE_MB / 1024 / 1024))
            dd if=cache_test_data/test_data_${FILE_SIZE_GB}gb_cache.bin of=/dev/null bs=1M count=100 status=none 2>/dev/null
            VERIFY_STATUS="SUCCESS"
          else
            FILE_SIZE_MB=0
            VERIFY_STATUS="FAILED"
          fi

          VERIFY_END_TIME=$(date +%s)
          VERIFICATION_TIME=$((VERIFY_END_TIME - VERIFY_START_TIME))

          echo "verification_time=$VERIFICATION_TIME" >> $GITHUB_OUTPUT

          echo "### Cache Verification Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Verification time:** ${VERIFICATION_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **File size:** ${FILE_SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Verification status:** $VERIFY_STATUS" >> $GITHUB_STEP_SUMMARY

      - name: Compute cache restore statistics
        id: compute_stats
        run: |
          FILE_SIZE_MB=${{ needs.cache_upload_test.outputs.file_size_mb }}
          CACHE_RESTORE_TIME=${{ steps.cache_timing.outputs.cache_restore_time }}
          CACHE_HIT="${{ steps.cache_restore.outputs.cache-hit }}"

          CACHE_RESTORE_SPEED_MBPS=""
          if [[ "$CACHE_HIT" == "true" && $CACHE_RESTORE_TIME -gt 0 && -n "$FILE_SIZE_MB" && "$FILE_SIZE_MB" -gt 0 ]]; then
            CACHE_RESTORE_SPEED_MBPS=$(echo "scale=2; $FILE_SIZE_MB / $CACHE_RESTORE_TIME" | bc -l 2>/dev/null || echo "")
          fi

          echo "cache_restore_speed_mbps=$CACHE_RESTORE_SPEED_MBPS" >> $GITHUB_OUTPUT

          echo "### Cache Restore Statistics (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$CACHE_RESTORE_SPEED_MBPS" ]]; then
            echo "- **Cache restore speed:** ${CACHE_RESTORE_SPEED_MBPS} MB/s" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Cache restore speed:** Unable to calculate" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.cache.download_speed_mb_s"
              value: ${{ steps.compute_stats.outputs.cache_restore_speed_mbps || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
              name: "hosted_compute.performance_test.cache.download_time_s"
              value: ${{ steps.cache_timing.outputs.cache_restore_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"

  checkout_performance_test:
    strategy:
      matrix:
        runner: [ubuntu-latest, ubuntu-latest-arm]
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    needs: system_info
    outputs:
      checkout_time: ${{ steps.metrics.outputs.checkout_time }}
      repo_size_mb: ${{ steps.metrics.outputs.repo_size_mb }}
      checkout_speed_mb_per_min: ${{ steps.metrics.outputs.checkout_speed_mb_per_min }}
      checkout_repo: ${{ steps.metrics.outputs.checkout_repo }}
      commit_count: ${{ steps.metrics.outputs.commit_count }}
      azure_vm_sku: ${{ steps.azure.outputs.azure_vm_sku }}
      azure_region: ${{ steps.azure.outputs.azure_region }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Azure metadata
        id: azure
        run: |
          AZURE_VM_SKU=""
          AZURE_REGION=""

          if curl -s -H "Metadata:true" --noproxy "*" --max-time 5 "http://169.254.169.254/metadata/instance?api-version=2021-02-01" > azure_metadata.json 2>/dev/null; then
            AZURE_VM_SKU=$(jq -r '.compute.vmSize // ""' azure_metadata.json 2>/dev/null || echo "")
            AZURE_REGION=$(jq -r '.compute.location // ""' azure_metadata.json 2>/dev/null || echo "")
          fi

          echo "azure_vm_sku=$AZURE_VM_SKU" >> $GITHUB_OUTPUT
          echo "azure_region=$AZURE_REGION" >> $GITHUB_OUTPUT

      - name: Start checkout timing
        run: |
          echo $(date +%s) > /tmp/checkout_start_time

      - name: Checkout test repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.checkout_repo || 'torvalds/linux' }}
          fetch-depth: 0
          path: checkout_test_repo

      - name: Calculate checkout performance metrics
        id: metrics
        run: |
          CHECKOUT_REPO="${{ github.event.inputs.checkout_repo || 'torvalds/linux' }}"

          CHECKOUT_END_TIME=$(date +%s)
          CHECKOUT_START_TIME=$(cat /tmp/checkout_start_time 2>/dev/null || echo $(date +%s))
          CHECKOUT_TIME=$((CHECKOUT_END_TIME - CHECKOUT_START_TIME))

          cd checkout_test_repo
          COMMIT_COUNT=$(git rev-list --all --count 2>/dev/null || echo "0")
          cd ..

          REPO_SIZE_BYTES=$(du -s checkout_test_repo 2>/dev/null | awk '{print $1}' || echo "0")
          REPO_SIZE_MB=$((REPO_SIZE_BYTES / 1024))

          CHECKOUT_SPEED_MB_PER_MIN=""
          if [[ $CHECKOUT_TIME -gt 0 && $REPO_SIZE_MB -gt 0 ]]; then
            CHECKOUT_SPEED_MB_PER_MIN=$(echo "scale=2; $REPO_SIZE_MB * 60 / $CHECKOUT_TIME" | bc -l 2>/dev/null || echo "")
          fi

          echo "checkout_time=$CHECKOUT_TIME" >> $GITHUB_OUTPUT
          echo "repo_size_mb=$REPO_SIZE_MB" >> $GITHUB_OUTPUT
          echo "checkout_speed_mb_per_min=$CHECKOUT_SPEED_MB_PER_MIN" >> $GITHUB_OUTPUT
          echo "checkout_repo=$CHECKOUT_REPO" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT

          echo "### Repository Checkout Performance Results (${{ matrix.runner }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** ${{ matrix.runner }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** $CHECKOUT_REPO" >> $GITHUB_STEP_SUMMARY
          echo "- **Checkout time:** ${CHECKOUT_TIME}s" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository size:** ${REPO_SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit count:** $COMMIT_COUNT" >> $GITHUB_STEP_SUMMARY
          if [[ -n "$CHECKOUT_SPEED_MB_PER_MIN" ]]; then
            echo "- **Checkout speed:** ${CHECKOUT_SPEED_MB_PER_MIN} MB/min" >> $GITHUB_STEP_SUMMARY
          fi
          if [[ -n "${{ steps.azure.outputs.azure_vm_sku }}" ]]; then
            echo "- **Azure VM SKU:** ${{ steps.azure.outputs.azure_vm_sku }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Azure Region:** ${{ steps.azure.outputs.azure_region }}" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Send metrics to Datadog
        if: always()
        uses: masci/datadog@6889e9d060f5368eeee51f8a3f06a52f65d04da3
        with:
          api-key: ${{ secrets.DATADOG_API_KEY }}
          metrics: |
            - type: "gauge"
              name: "hosted_compute.performance_test.checkout.time_s"
              value: ${{ steps.metrics.outputs.checkout_time || '0' }}
              tags:
                - "runner:${{ matrix.runner }}"
                - "azure_vm_sku:${{ steps.azure.outputs.azure_vm_sku }}"
                - "azure_region:${{ steps.azure.outputs.azure_region }}"
            - type: "gauge"
